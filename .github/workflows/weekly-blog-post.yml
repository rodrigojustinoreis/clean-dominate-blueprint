name: Weekly Blog Post Generator

on:
  schedule:
    # Every Monday at 9:00 AM ET (14:00 UTC)
    - cron: "0 14 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate weekly blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: node scripts/generate-weekly-post.mjs

      - name: Build site (verify no TypeScript errors)
        run: npm ci && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Commit and push new blog post
        run: |
          git config user.name "Capital Clean Care Bot"
          git config user.email "bot@capitalcleancare.com"
          git add src/data/auto-blog-posts.ts src/prerender.tsx public/sitemap.xml
          git diff --staged --quiet || git commit -m "feat(blog): auto-generate weekly cleaning tips post [skip ci]"
          git push
