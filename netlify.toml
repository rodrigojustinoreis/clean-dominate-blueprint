[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "http://capitalcleancare.com/*"
  to = "https://capitalcleancare.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.capitalcleancare.com/*"
  to = "https://capitalcleancare.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.capitalcleancare.com/*"
  to = "https://capitalcleancare.com/:splat"
  status = 301
  force = true

# ── /premium-clean → homepage ─────────────────────────────────────────────────
[[redirects]]
  from = "/premium-clean"
  to = "/"
  status = 301

# ── Trailing slash normalization ──────────────────────────────────────────────
[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301

[[redirects]]
  from = "/contact/"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/blog/"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/reviews/"
  to = "/reviews"
  status = 301

[[redirects]]
  from = "/faq/"
  to = "/faq"
  status = 301

[[redirects]]
  from = "/careers/"
  to = "/careers"
  status = 301

[[redirects]]
  from = "/services/"
  to = "/services/house-cleaning"
  status = 301

# ── Soft 404 / old URL patterns found in Search Console ─────────────────────
[[redirects]]
  from = "/clean-service-chevy-chase"
  to = "/locations/chevy-chase-md"
  status = 301

[[redirects]]
  from = "/clean-service-kentlands"
