  from = "/"
  to = "/blog/"
  status = 301
  force = true
  query = {blog = "y"}

[[redirects]]
  from = "/"
  to = "/blog/"
  status = 301
  force = true
  query = {blogcategory = ":cat"}

# ── Serve prerendered pages at canonical non-trailing-slash URLs (200 rewrite)─
# force = true overrides Netlify Pretty URLs before redirect rules run.
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug/"
  status = 200
  force = true

[[redirects]]
  from = "/locations/:city"
  to = "/locations/:city/"
