# ── Blog query-parameter cleanup ─────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/blog/"
  status = 301
  force = true
  query = {blog = "y"}

[[redirects]]
  from = "/"
  to = "/blog/"
  status = 301
  force = true
  query = {blogcategory = ":cat"}

# ── Serve prerendered pages at canonical non-trailing-slash URLs (200 rewrite)─
# force = true overrides Netlify Pretty URLs before redirect rules run.
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug/"
  status = 200
  force = true

[[redirects]]
  from = "/locations/:city"
  to = "/locations/:city/"
  status = 200
  force = true

[[redirects]]
  from = "/locations/:city/:service"
  to = "/locations/:city/:service/"
  status = 200
  force = true

[[redirects]]
  from = "/services/:slug"
  to = "/services/:slug/"
  status = 200
  force = true

[[redirects]]
  from = "/maryland"
  to = "/maryland/"
  status = 200
  force = true

[[redirects]]
  from = "/virginia"
  to = "/virginia/"
  status = 200
  force = true

[[redirects]]
  from = "/washington-dc"
  to = "/washington-dc/"
  status = 200
  force = true

# ── SPA fallback (must be last) ───────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
