# ── Dead/old internal URLs ────────────────────────────────────────────────────
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/home/"
  to = "/"
  status = 301

[[redirects]]
  from = "/house-cleaning-1"
  to = "/services/house-cleaning"
  status = 301

[[redirects]]
  from = "/f/*"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/services/recurring-cleaning/"
  to = "/services/recurring-cleaning"
  status = 301

# ── Blog query-parameter cleanup ─────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/blog"
  status = 301
  query = {blog = "y"}

[[redirects]]
  from = "/"
  to = "/blog"
  status = 301
  query = {blogcategory = ":cat"}

# ── SPA fallback (must be last) ───────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
