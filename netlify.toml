  status = 200
  force = true

[[redirects]]
  from = "/terms-of-service"
  to = "/terms-of-service/"
  status = 200
  force = true


# ── PR #6 — Trailing-slash canonicalization ──────────────────────────────────
# Forces /path/ → /path (no trailing slash) for all location URLs so Google
# doesn't index two versions of the same page.

[[redirects]]
  from = "/locations/*/"
  to = "/locations/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/services/*/"
  to = "/services/:splat"
  status = 301
  force = true


# ── PR #5 — Zombie page pruning (38 non-static cities = 760 URLs) ────────────
# Returns 410 Gone for all /locations/<non-static-city>/* paths so Google
# drops them from the index. Camada 2 perms (within static cities) are handled
# by noindex meta in ServiceLocationPage.tsx via serviceLocationAllowlist.ts.

[[redirects]]
  from = "/join-our-team"
  to = "/index.html"
  status = 200

# ── SPA fallback (must be last) ───────────────────────────────────────────────
# Genuinely unmatched URLs now return a real HTTP 404 (was 200 = soft-404, the root
# cause of "Crawled – not indexed"). The SPA shell still loads and React Router
# renders the NotFound page, which also carries <meta name="robots" content="noindex">.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
