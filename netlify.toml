# ── Dead/old internal URLs ────────────────────────────────────────────────────
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/home/"
  to = "/"
  status = 301

[[redirects]]
  from = "/house-cleaning-1"
  to = "/services/house-cleaning"
  status = 301

[[redirects]]
  from = "/f/*"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/services/recurring-cleaning/"
  to = "/services/recurring-cleaning"
  status = 301

# ── Blog slug with date → evergreen slug ─────────────────────────────────────
[[redirects]]
  from = "/blog/deep-cleaning-tips-maryland-homes-spring-prep-march-2026"
  to = "/blog/deep-cleaning-tips-maryland-homes-spring-prep"
  status = 301

# ── Blog query-parameter cleanup ─────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/blog"
  status = 301
  force = true
  query = {blog = "y"}

[[redirects]]
  from = "/"
  to = "/blog"
  status = 301
  force = true
  query = {blogcategory = ":cat"}

# ── Serve prerendered pages at canonical non-trailing-slash URLs (200 rewrite)─
# Netlify would otherwise 301 /blog/slug → /blog/slug/ because files are in
# dist/blog/slug/index.html. These rewrites intercept before that happens,
# serving the same index.html content at the clean canonical URL.
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug/"
  status = 200

[[redirects]]
  from = "/locations/:city"
  to = "/locations/:city/"
  status = 200

[[redirects]]
  from = "/locations/:city/:service"
  to = "/locations/:city/:service/"
  status = 200

[[redirects]]
  from = "/services/:slug"
  to = "/services/:slug/"
  status = 200

# ── SPA fallback (must be last) ───────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
