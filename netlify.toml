[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "http://capitalcleancare.com/*"
  to = "https://capitalcleancare.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.capitalcleancare.com/*"
  to = "https://capitalcleancare.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.capitalcleancare.com/*"
  to = "https://capitalcleancare.com/:splat"
  status = 301
  force = true

# ── State hub: trailing-slash normalisation removed (was causing infinite redirect loop)
# The 200 force=true rewrites below serve /maryland, /virginia, /washington-dc directly.

# ── 404 fixes: missing pages that Google has indexed ─────────────────────────
# These paths match a 200-rewrite pattern but have no prerendered file,
# so they return 404 instead of falling through to the SPA. Fix with explicit 301s.
[[redirects]]
  from = "/services/move-in-cleaning"
  to = "/services/move-out-cleaning"
  status = 301

[[redirects]]
