[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "http://capitalcleancare.com/*"
  to = "https://capitalcleancare.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.capitalcleancare.com/*"
